replicaCount: 1

image:
  repository: ghcr.io/nparthiphp/drift-detection-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  DRIFT_LOG_LEVEL: INFO
  # DRIFT_REDIS_URL: redis://redis:6379/0   # uncomment for shared/persistent state
  # DRIFT_API_KEY: ""                       # set via a Secret in production, not plain values.yaml

livenessProbe:
  httpGet:
    path: /healthz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /readyz
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
